server:
  port: 8080

spring:
  application:
    name: twinops-backend
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/twinops?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  config:
    import: classpath:llm.yml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:twinops-analysis-consumer}
      auto-offset-reset: latest
    producer:
      acks: all

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

management:
  endpoints:
    web:
      exposure:
        include: health,info

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: twinops-analysis-producer

twinops:
  auth:
    admin:
      username: admin
      password: admin123456
      display-name: System Administrator
  analysis:
    time:
      storage-zone-id: UTC
      display-zone-id: Asia/Shanghai
    automation:
      enabled: true
      topic: analysis.request
      consumer-group: twinops-analysis-consumer
