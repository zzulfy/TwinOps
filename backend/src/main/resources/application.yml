server:
  port: 8080

spring:
  application:
    name: twinops-backend
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/twinops?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  config:
    import: classpath:llm.yml

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

management:
  endpoints:
    web:
      exposure:
        include: health,info

twinops:
  auth:
    admin:
      username: admin
      password: admin123456
      display-name: System Administrator
